<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2f6b4a" />
      <stop offset="100%" stop-color="#123521" />
    </linearGradient>
  </defs>

  <!-- Base rounded background -->
  <rect width="32" height="32" rx="8" fill="url(#bgGrad)" />

  <!-- Field card -->
  <rect x="7" y="9" width="18" height="15" rx="3" fill="#faf8f4" />

  <!-- Exhaust pipe, pokes above the card like the Clinic calendar rings -->
  <rect x="10.6" y="7" width="1.3" height="4.5" rx="0.65" fill="#1f4d3a" />

  <!-- Cabin -->
  <rect x="10" y="11.5" width="5.5" height="6" rx="1" fill="#1f4d3a" />

  <!-- Hood -->
  <path d="M15.5 17 L20.5 18.7 L20.5 20.3 L15.5 20.3 Z" fill="#1f4d3a" />

  <!-- Rear wheel (big) -->
  <circle cx="12.7" cy="20.1" r="3.4" fill="#1f4d3a" />
  <circle cx="12.7" cy="20.1" r="1.3" fill="#faf8f4" />

  <!-- Front wheel (small) -->
  <circle cx="20.5" cy="21.3" r="2.1" fill="#1f4d3a" />
  <circle cx="20.5" cy="21.3" r="0.8" fill="#faf8f4" />
</svg>
