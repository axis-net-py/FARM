<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Background Gradient (AXIS Farm deep campo green) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2b1e" />
      <stop offset="100%" stop-color="#04130c" />
    </linearGradient>
    <!-- Harvest Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3e098" />
      <stop offset="50%" stop-color="#c4ad7f" />
      <stop offset="100%" stop-color="#a98e5b" />
    </linearGradient>
  </defs>

  <!-- Base rounded background -->
  <rect width="32" height="32" rx="7" fill="url(#bgGrad)" />

  <!-- Stylized geometric 'A' (matches the sidebar/login brand badge) -->
  <path d="M16 6 L25 24 H20.5 L16 14.5 L11.5 24 H7 L16 6 Z" fill="url(#goldGrad)" />
  <!-- Inner negative space cutout -->
  <polygon points="16,10 18.5,15.5 13.5,15.5" fill="#0f2b1e" />

  <!-- Wheat-leaf accent tucked at the peak -->
  <path d="M16 6 C18.8 8.5 19.4 12 17.3 14 C16 12 15.6 9 16 6 Z" fill="#3daa78" opacity="0.9" />

</svg>
